<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#07080f"/>
  <link rel="apple-touch-icon" href="icon.png"/>
<link rel="icon" type="image/png" href="icon.png"/>
<meta name="apple-mobile-web-app-title" content="FitCore"/>
  <title>FitCore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #07080f;
  --surface: #0f1118;
  --card: #141824;
  --card2: #1a2030;
  --border: #222a3a;
  --accent: #b8ff57;
  --accent-dim: rgba(184,255,87,0.12);
  --accent-glow: rgba(184,255,87,0.3);
  --red: #ff5555;
  --red-dim: rgba(255,85,85,0.12);
  --green: #00e676;
  --green-dim: rgba(0,230,118,0.12);
  --blue: #4fc3f7;
  --yellow: #ffd166;
  --text: #e2e8f8;
  --muted: #4a5a72;
  --muted2: #7a8a9a;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --r: 16px;
  --r-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;}

/* ── SCROLL AREA ── */
#views{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:calc(72px + var(--safe-bottom));}
#views::-webkit-scrollbar{display:none;}

/* ── BOTTOM NAV ── */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(10,11,18,0.92);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  padding:8px 0 calc(8px + var(--safe-bottom));
  display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;
  cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--font-body);
  font-size:10px;letter-spacing:0.5px;transition:color 0.2s;}
.nav-btn svg{width:22px;height:22px;transition:transform 0.2s;}
.nav-btn.active{color:var(--accent);}
.nav-btn.active svg{transform:scale(1.15);}

/* ── HEADER ── */
.view-header{padding:52px 20px 16px;display:flex;align-items:center;justify-content:space-between;}
.view-title{font-family:var(--font-head);font-size:32px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.header-sub{font-size:13px;color:var(--muted2);margin-top:2px;}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r);padding:18px;border:1px solid var(--border);}
.card2{background:var(--card2);border-radius:var(--r);padding:16px;border:1px solid var(--border);}
.section{padding:0 16px 16px;}
.section-title{font-family:var(--font-head);font-size:14px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted2);margin-bottom:10px;}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;
  font-family:var(--font-body);font-weight:600;border-radius:var(--r-sm);transition:all 0.15s;}
.btn-primary{background:var(--accent);color:#07080f;padding:14px 24px;font-size:15px;width:100%;}
.btn-primary:active{transform:scale(0.97);background:#a0e048;}
.btn-secondary{background:var(--card2);color:var(--text);padding:12px 20px;font-size:14px;border:1px solid var(--border);}
.btn-secondary:active{transform:scale(0.97);}
.btn-ghost{background:transparent;color:var(--muted2);padding:10px;font-size:13px;}
.btn-danger{background:var(--red-dim);color:var(--red);padding:12px 20px;font-size:14px;border:1px solid rgba(255,85,85,0.2);}

/* ── INPUTS ── */
.input{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);
  color:var(--text);font-family:var(--font-body);font-size:16px;padding:12px 14px;width:100%;
  outline:none;transition:border-color 0.2s;}
.input:focus{border-color:var(--accent);}
.input::placeholder{color:var(--muted);}
select.input option{background:var(--card);}
.label{font-size:12px;font-weight:600;color:var(--muted2);letter-spacing:0.5px;margin-bottom:6px;display:block;}
.form-group{margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── FEELING BUTTONS ── */
.feeling-row{display:flex;gap:8px;}
.feel-btn{flex:1;padding:10px 4px;border:1px solid var(--border);border-radius:var(--r-sm);
  background:var(--card2);cursor:pointer;text-align:center;font-size:20px;transition:all 0.15s;}
.feel-btn.active{border-color:var(--accent);background:var(--accent-dim);transform:scale(1.05);}

/* ── STAT CHIPS ── */
.stat-chip{background:var(--card2);border-radius:var(--r-sm);padding:12px;text-align:center;border:1px solid var(--border);}
.stat-chip .val{font-family:var(--font-head);font-size:24px;font-weight:700;}
.stat-chip .lbl{font-size:11px;color:var(--muted2);margin-top:2px;}

/* ── COMPARE ARROW ── */
.cmp{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 8px;border-radius:20px;}
.cmp.up{color:var(--green);background:var(--green-dim);}
.cmp.down{color:var(--red);background:var(--red-dim);}
.cmp.same{color:var(--muted2);background:var(--card2);}

/* ── PROGRESS BAR ── */
.progress-wrap{background:var(--card2);border-radius:20px;height:8px;overflow:hidden;}
.progress-bar{height:100%;background:var(--accent);border-radius:20px;transition:width 0.6s;}

/* ── LIST ITEMS ── */
.list-item{display:flex;align-items:center;padding:14px;background:var(--card);border-radius:var(--r-sm);
  margin-bottom:8px;border:1px solid var(--border);}
.list-item .li-icon{width:40px;height:40px;border-radius:10px;background:var(--accent-dim);
  display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0;font-size:18px;}
.list-item .li-main{flex:1;min-width:0;}
.list-item .li-title{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-item .li-sub{font-size:12px;color:var(--muted2);margin-top:2px;}
.list-item .li-right{text-align:right;flex-shrink:0;margin-left:10px;}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center;}
#modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px calc(24px + var(--safe-bottom));
  width:100%;max-width:430px;max-height:90vh;overflow-y:auto;border-top:1px solid var(--border);}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:var(--font-head);font-size:24px;font-weight:700;margin-bottom:20px;}

/* ── DASHBOARD ── */
.dash-kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.kpi-val{font-family:var(--font-head);font-size:28px;font-weight:800;line-height:1;}
.kpi-label{font-size:11px;color:var(--muted2);margin-top:4px;letter-spacing:0.3px;}
.kpi-accent{border-color:rgba(184,255,87,0.3);background:linear-gradient(135deg,#141824,#1a2416);}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer;line-height:1;}
.cal-nav-btn:active{background:var(--accent-dim);border-color:var(--accent);}
.cal-month-title{font-family:var(--font-head);font-size:18px;font-weight:700;letter-spacing:1px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-head{text-align:center;font-size:9px;font-weight:700;color:var(--muted);
  padding:4px 0;letter-spacing:0.5px;}
.cal-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:9px;position:relative;
  background:transparent;}
.cal-cell.has-day{background:var(--card2);}
.cal-cell.today{border:1.5px solid var(--accent);}
.cal-cell.future{opacity:0.35;}
.cal-cell.run{background:rgba(79,195,247,0.2);}
.cal-cell.gym{background:rgba(184,255,87,0.18);}
.cal-cell.both{background:linear-gradient(135deg,rgba(79,195,247,0.25),rgba(184,255,87,0.25));}
.cal-cell .cal-num{font-size:8px;color:var(--muted2);line-height:1;margin-bottom:1px;}
.cal-cell.today .cal-num{color:var(--accent);font-weight:700;}
.cal-cell .cal-icon{font-size:10px;line-height:1;}

/* ── GYM ── */
.muscle-tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;
  font-size:11px;font-weight:600;background:var(--card2);color:var(--muted2);margin:2px;}
.muscle-tag.primary{background:var(--accent-dim);color:var(--accent);}
.set-row{display:grid;grid-template-columns:36px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;}
.set-num{width:32px;height:32px;border-radius:50%;background:var(--card2);display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700;color:var(--muted2);}
.set-num.done{background:var(--accent-dim);color:var(--accent);}
.set-type{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.5px;}
.set-type.warmup{background:rgba(255,209,102,0.2);color:var(--yellow);}
.set-type.superset{background:rgba(79,195,247,0.2);color:var(--blue);}
.set-type.dropset{background:rgba(255,85,85,0.2);color:var(--red);}
.num-input-wrap{display:flex;align-items:center;gap:0;background:var(--card2);border-radius:var(--r-sm);border:1px solid var(--border);}
.num-btn{width:36px;height:40px;background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.num-val{flex:1;text-align:center;font-size:15px;font-weight:600;min-width:40px;}

/* ── EXERCISE PICKER ── */
.ex-filter{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px;}
.ex-filter::-webkit-scrollbar{display:none;}
.filter-chip{padding:6px 14px;border-radius:20px;background:var(--card2);border:1px solid var(--border);
  color:var(--muted2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.filter-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.ex-item{display:flex;align-items:center;padding:12px;border-radius:var(--r-sm);background:var(--card);
  border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all 0.15s;}
.ex-item:active{border-color:var(--accent);background:var(--accent-dim);}

/* ── TREND CHART ── */
.chart-wrap{position:relative;height:160px;margin-top:8px;}

/* ── STREAK ── */
.streak-big{font-family:var(--font-head);font-size:64px;font-weight:800;color:var(--accent);line-height:1;}
.streak-label{font-size:14px;color:var(--muted2);}

/* ── TABS ── */
.tabs{display:flex;background:var(--card2);border-radius:var(--r-sm);padding:4px;margin-bottom:16px;}
.tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  color:var(--muted2);transition:all 0.15s;}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3);}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--muted2);line-height:1.6;}

/* ── NUTRITION ── */
.macro-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.macro-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.macro-val{font-family:var(--font-head);font-size:36px;font-weight:800;}
.macro-unit{font-size:14px;color:var(--muted2);}
.macro-label{font-size:12px;color:var(--muted2);margin-top:4px;}

/* ── HEALTH INDICATOR ── */
.health-bar{display:flex;gap:4px;align-items:center;}
.health-dot{width:10px;height:10px;border-radius:50%;}

/* ── CONFIRM DIALOG ── */
#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;
  display:none;align-items:center;justify-content:center;padding:20px;}
#confirm-overlay.open{display:flex;}
#confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:28px 24px;width:100%;max-width:320px;text-align:center;}
#confirm-title{font-family:var(--font-head);font-size:22px;font-weight:700;margin-bottom:20px;line-height:1.3;}
#confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.confirm-no{background:var(--card2);color:var(--text);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:13px;font-family:var(--font-body);font-size:14px;
  font-weight:600;cursor:pointer;}
.confirm-ok{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,85,85,0.3);
  border-radius:var(--r-sm);padding:13px;font-family:var(--font-body);font-size:14px;
  font-weight:600;cursor:pointer;}
.confirm-ok:active{background:var(--red);color:#fff;}


/* ── TOAST ── */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:#1a2030;border:1px solid #222a3a;border-radius:10px;padding:12px 20px;
  font-size:14px;font-weight:600;z-index:999;transition:transform 0.3s ease;
  max-width:calc(100% - 40px);text-align:center;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.error{border-color:#ff5555;color:#ff5555;}
#toast.success{border-color:#b8ff57;color:#b8ff57;}

/* ── SETUP SCREEN ── */
#setup-screen{position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;padding:40px 20px calc(40px + var(--safe-bottom));}
.setup-logo{font-family:var(--font-head);font-size:48px;font-weight:800;color:var(--accent);letter-spacing:2px;text-align:center;margin-bottom:8px;}
.setup-sub{text-align:center;color:var(--muted2);margin-bottom:32px;font-size:14px;}

/* ── ZONES & FITNESS ── */
.zone-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.zone-1{background:rgba(100,220,100,0.15);color:#64dc64;}
.zone-2{background:rgba(79,195,247,0.15);color:#4fc3f7;}
.zone-3{background:rgba(184,255,87,0.15);color:#b8ff57;}
.zone-4{background:rgba(255,165,0,0.15);color:#ffa500;}
.zone-5{background:rgba(255,85,85,0.15);color:#ff5555;}
.zone-x{background:#1a2030;color:#4a5a72;}
.fit-untr{background:rgba(255,85,85,0.12);color:#ff5555;}
.fit-maess{background:rgba(255,165,0,0.12);color:#ffa500;}
.fit-gut{background:rgba(184,255,87,0.12);color:#b8ff57;}
.fit-sehr{background:rgba(0,230,118,0.12);color:#00e676;}
.suggest-card{background:linear-gradient(135deg,#141824,#121c20);border:1px solid rgba(79,195,247,0.3);border-radius:16px;padding:16px;}
.suggest-pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(79,195,247,0.12);color:#4fc3f7;margin-bottom:8px;}

/* ── SET CONTROLS ── */
.set-delete{width:28px;height:28px;border-radius:50%;background:none;border:1px solid var(--border);
  color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.set-delete:active{background:var(--red-dim);color:var(--red);border-color:var(--red);}
.set-move{width:24px;height:24px;border-radius:4px;background:none;border:none;
  color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.set-note-input{width:100%;background:none;border:none;border-bottom:1px solid var(--border);
  color:var(--muted2);font-family:var(--font-body);font-size:12px;padding:4px 0;outline:none;margin-top:4px;}
.set-note-input::placeholder{color:var(--muted);}
/* ── TEMPLATES ── */
.template-chip{padding:10px 14px;background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);
  cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.template-chip:active{border-color:var(--accent);background:var(--accent-dim);}
.last-set-hint{font-size:11px;color:var(--blue);background:rgba(79,195,247,0.08);
  padding:2px 7px;border-radius:4px;margin-left:4px;}

/* ── LIVE RUN ── */
.live-run-screen{min-height:100%;background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:60px 20px 120px;}
.live-run-time{font-family:var(--font-head);font-size:80px;font-weight:800;color:var(--accent);line-height:1;letter-spacing:2px;}
.live-run-km{font-family:var(--font-head);font-size:48px;font-weight:700;color:var(--text);line-height:1;margin-top:8px;}
.live-run-label{font-size:12px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.live-run-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;margin-top:32px;}
.live-run-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;}
.live-run-stat-val{font-family:var(--font-head);font-size:28px;font-weight:700;}
.live-run-stat-lbl{font-size:11px;color:var(--muted2);margin-top:4px;letter-spacing:0.5px;}
.stop-btn{width:80px;height:80px;border-radius:50%;background:var(--red);border:none;
  color:#fff;font-size:28px;cursor:pointer;margin-top:40px;
  box-shadow:0 0 0 8px rgba(255,85,85,0.2);transition:transform 0.15s;}
.stop-btn:active{transform:scale(0.93);}
.pulse-flow-screen{min-height:100%;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.pulse-countdown{font-family:var(--font-head);font-size:120px;font-weight:800;color:var(--accent);line-height:1;}
.pulse-timer-ring{font-family:var(--font-head);font-size:64px;font-weight:800;color:var(--blue);line-height:1;}
.pulse-instruction{font-size:16px;color:var(--text);line-height:1.6;margin:16px 0;}
.pulse-sub{font-size:13px;color:var(--muted2);line-height:1.5;}


/* ── REST TIMER ── */
#rest-timer{position:fixed;bottom:calc(64px + var(--safe-bottom));left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:398px;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:10px 16px;z-index:90;display:none;
  align-items:center;justify-content:space-between;gap:12px;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);}
#rest-timer.active{display:flex;}
#rest-timer-bar-wrap{flex:1;height:4px;background:var(--card2);border-radius:2px;overflow:hidden;}
#rest-timer-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear;}
#rest-timer-label{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--accent);min-width:40px;text-align:center;}
#rest-timer-skip{background:none;border:1px solid var(--border);color:var(--muted2);border-radius:6px;
  padding:4px 10px;font-size:12px;cursor:pointer;white-space:nowrap;}

/* ── PR BADGE ── */
.pr-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;
  font-size:10px;font-weight:700;background:rgba(255,209,102,0.15);color:var(--yellow);
  border:1px solid rgba(255,209,102,0.3);animation:prPop 0.4s ease;}

function saveProfile(){
  const p = {
    name: document.getElementById('s-name').value||'',
    age: +document.getElementById('s-age').value||25,
    gender: document.getElementById('s-gender').value,
    height: +document.getElementById('s-height').value||175,

    weekGoal: +document.getElementById('s-goal').value||3,
    created: Date.now()
  };
  if(!p.height||!p.age){alert('Bitte Alter und Größe eingeben!');return;}
  DB.set('profile',p);
  // Save initial weight
  const bd = DB.get('bodydata');
  bd.unshift({date:today(),weight:p.weight,pulse:null,sleep:null});
  DB.set('bodydata',bd);
  document.getElementById('setup-screen').style.display='none';

function getProfile(){return DB.getObj('profile',{name:'',age:25,gender:'m',height:175,weight:75,activity:1.55,weekGoal:3});}

// ════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════
function today(){return localDateStr(new Date());}
function localDateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}function fmtDate(d){const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('de-DE',{day:'2-digit',month:'short'});}
function fmtPace(km,sec){if(!km||!sec)return'–';const ps=sec/km;const m=Math.floor(ps/60),s=Math.round(ps%60);return`${m}:${s.toString().padStart(2,'0')}`;}
function timeToSec(t){if(!t)return 0;const p=t.split(':');if(p.length===3)return +p[0]*3600+ +p[1]*60+ +p[2];return +p[0]*60+ +p[1];}
function secToTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?`${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`:`${m}:${sec.toString().padStart(2,'0')}`;}
function weekStart(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));return d;}
function prevWeekStart(){const d=weekStart();d.setDate(d.getDate()-7);return d;}
function cmp(a,b,rev=false){
  if(a==null||b==null)return`<span class="cmp same">– –</span>`;
  const diff=a-b,pct=b?Math.round(Math.abs(diff)/b*100):0;
  const up=rev?diff<0:diff>0;
  const sym=diff===0?'→':up?'↑':'↓';
  const cls=diff===0?'same':up?'up':'down';
  return`<span class="cmp ${cls}">${sym} ${pct>0?pct+'%':''}</span>`;
}

// ════════════════════════════════════════
//  NUTRITION CALC
// ════════════════════════════════════════
function calcNutrition(){
  const p=getProfile();
  const s=DB.getObj('settings',{});
  const bd=DB.get('bodydata');
  const w=bd.length?bd[0].weight:p.weight;
  let bmr;
  if(p.gender==='f') bmr=10*w+6.25*p.height-5*p.age-161;
  else bmr=10*w+6.25*p.height-5*p.age+5;
  const weightAdj={loss:-300,maintain:0,gain:+300}[s.weightGoal||'maintain']||0;
  const autoTdee=Math.round(bmr*p.activity)+weightAdj;
  const tdee=s.kcalOverride?+s.kcalOverride:autoTdee;
  const autoProtTarget=Math.round(w*1.4);
  const protTarget=s.protOverride?+s.protOverride:autoProtTarget;
  return {
    tdee, bmr:Math.round(bmr),
    protMin:Math.round(w*0.8),
    protTarget, weight:w,
    weightAdj, autoTdee,
    isKcalManual:!!s.kcalOverride,
    isProtManual:!!s.protOverride
  };
}


// ════════════════════════════════════════

function getZone(bpm,age){
  const f=age?Math.max(0.85,Math.min(1.1,25/age)):1;
  const z=[[117,136],[137,151],[152,166],[167,181],[182,195]].map(r=>[Math.round(r[0]*f),Math.round(r[1]*f)]);
  if(!bpm)return{zone:0,label:'–',cls:'zone-x'};
  for(let i=0;i<z.length;i++)if(bpm>=z[i][0]&&bpm<=z[i][1])return{zone:i+1,label:`Zone ${i+1}`,cls:`zone-${i+1}`};
  if(bpm<z[0][0])return{zone:1,label:'Zone 1',cls:'zone-1'};
  return{zone:5,label:'Zone 5',cls:'zone-5'};
}
function calcFitnessLevel(run){
  if(!run.pulsLoad||!run.pulsRecovery)return null;
  const d=run.pulsLoad-run.pulsRecovery;
  if(d<25)return{delta:d,label:'Untrainiert',cls:'fit-untr'};
  if(d<40)return{delta:d,label:'Mäßig',cls:'fit-maess'};
  if(d<60)return{delta:d,label:'Gut',cls:'fit-gut'};
  return{delta:d,label:'Sehr gut',cls:'fit-sehr'};
}

function trendArrow(current, prev, higherIsBetter=true){
  if(current==null||prev==null||prev===0) return`<span style="color:var(--muted2);">–</span>`;
  const pct=Math.round(Math.abs(current-prev)/prev*100);
  const improved=higherIsBetter?current>prev:current<prev;
  const same=Math.abs(current-prev)/prev<0.02;
  if(same) return`<span style="color:var(--muted2);">→</span>`;
  return improved
    ?`<span style="color:var(--green);">↑ ${pct}%</span>`
    :`<span style="color:var(--red);">↓ ${pct}%</span>`;
}
function avgOf(arr){ return arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length*10)/10:null; }

// ════════════════════════════════════════
//  LIVE RUN
// ════════════════════════════════════════
function haversine(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fmtTime(sec){
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  if(h>0)return`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function startLiveRun(){
  if(!navigator.geolocation){showToast('GPS nicht verfügbar','error');return;}
  // Request WakeLock to keep screen on
  let wakeLock=null;
  try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}

  liveRun={startTime:Date.now(),coords:[],distance:0,watchId:null,wakeLock,elapsed:0,timerInterval:null};

  // Start GPS
  liveRun.watchId=navigator.geolocation.watchPosition(pos=>{
    const {latitude:lat,longitude:lon,accuracy}=pos.coords;
    if(accuracy>30)return; // ignore inaccurate points
    const prev=liveRun.coords[liveRun.coords.length-1];
    if(prev){
      const d=haversine(prev.lat,prev.lon,lat,lon);
      if(d>0.005)liveRun.distance+=d; // ignore <5m jitter
    }
    liveRun.coords.push({lat,lon,t:Date.now()});
    updateLiveRunDisplay();
  },{enableHighAccuracy:true,maximumAge:2000,timeout:10000});

  // Start timer
  liveRun.timerInterval=setInterval(()=>{
    liveRun.elapsed=Math.round((Date.now()-liveRun.startTime)/1000);
    updateLiveRunDisplay();
  },1000);

  showView('run');
}

function updateLiveRunDisplay(){
  const el=document.getElementById('live-run-time');
  const elKm=document.getElementById('live-run-km');
  const elPace=document.getElementById('live-run-pace');
  const elGps=document.getElementById('live-run-gps');
  if(!el||!liveRun)return;
  el.textContent=fmtTime(liveRun.elapsed);
  elKm&&(elKm.textContent=liveRun.distance.toFixed(2)+' km');
  if(elPace){
    const pace=liveRun.distance>0.1?liveRun.elapsed/liveRun.distance:0;
    elPace.textContent=pace>0?fmtPace(1,pace):'–:––';
  }
  if(elGps){
    const pts=liveRun.coords.length;
    elGps.textContent=pts>0?'📡 GPS aktiv':'📡 Suche…';
  }
}

function stopLiveRun(){
  if(!liveRun)return;
  clearInterval(liveRun.timerInterval);
  navigator.geolocation.clearWatch(liveRun.watchId);
  if(liveRun.wakeLock)try{liveRun.wakeLock.release();}catch(e){}
  // Start pulse flow
  startPulseFlow();
}

// ── PULSE FLOW ──
function startPulseFlow(){
  pulseFlowStep=1;
  pulseFlowCount=3;
  capturedPulsLoad=null;
  showView('run');
  pulseFlowInterval=setInterval(()=>{
    pulseFlowCount--;
    if(pulseFlowCount<=0){
      clearInterval(pulseFlowInterval);
      pulseFlowStep=2; // show 15s measurement timer
      pulseFlowCount=15;
      showView('run');
      pulseFlowInterval=setInterval(()=>{
        pulseFlowCount--;
        updatePulseFlowTimer();
        if(pulseFlowCount<=0){
          clearInterval(pulseFlowInterval);
          pulseFlowStep=3; // show input for load pulse
          showView('run');
        }
      },1000);
    } else {
      updatePulseFlowCountdown();
    }
  },1000);
}

function updatePulseFlowCountdown(){
  const el=document.getElementById('pulse-countdown-num');
  if(el)el.textContent=pulseFlowCount;
}

function updatePulseFlowTimer(){
  const el=document.getElementById('pulse-timer-num');
  if(el)el.textContent=pulseFlowCount;
  const bar=document.getElementById('pulse-timer-bar');
  if(bar)bar.style.width=Math.round(pulseFlowCount/15*100)+'%';
}

function savePulseLoad(){
  const v=+document.getElementById('pulse-load-input').value;
  if(!v){showToast('Bitte Puls eingeben!','error');return;}
  capturedPulsLoad=v;
  pulseFlowStep=4; // 60s recovery countdown
  pulseFlowCount=60;
  showView('run');
  pulseFlowInterval=setInterval(()=>{
    pulseFlowCount--;
    updatePulseRecoveryTimer();
    if(pulseFlowCount<=0){
      clearInterval(pulseFlowInterval);
      pulseFlowStep=5; // show input for recovery pulse + 15s timer
      pulseFlowCount=15;
      showView('run');
      pulseFlowInterval=setInterval(()=>{
        pulseFlowCount--;
        updatePulseRecoveryMeasureTimer();
        if(pulseFlowCount<=0){
          clearInterval(pulseFlowInterval);
          pulseFlowStep=6;
          showView('run');
        }
      },1000);
    }
  },1000);
}

function updatePulseRecoveryTimer(){
  const el=document.getElementById('pulse-recovery-countdown');
  if(el)el.textContent=pulseFlowCount;
  const bar=document.getElementById('pulse-recovery-bar');
  if(bar)bar.style.width=Math.round(pulseFlowCount/60*100)+'%';
}

function getPR(exName){
  // Returns {weight, reps} of all-time best set for this exercise
  const workouts=DB.get('workouts');
  let bestWeight=0, bestReps=0;
  workouts.forEach(w=>{
    const ex=w.exercises.find(e=>e.name===exName);
    if(!ex)return;
    ex.sets.filter(s=>s.type!=='warmup').forEach(s=>{
      if(s.weight>bestWeight||(s.weight===bestWeight&&s.reps>bestReps)){
        bestWeight=s.weight;bestReps=s.reps;
      }
    });
  });
  return bestWeight>0?{weight:bestWeight,reps:bestReps}:null;
}

function checkIsPR(exName, weight, reps){
  const pr=getPR(exName);
  if(!pr)return true; // first time = PR
  return weight>pr.weight||(weight===pr.weight&&reps>pr.reps);
}

function startRestTimer(){
  const s=DB.getObj('settings',{});
  restTimerTotal=s.restTime?+s.restTime:120;
  restTimerLeft=restTimerTotal;
  clearInterval(restTimerInterval);
  const bar=document.getElementById('rest-timer-bar');
  const label=document.getElementById('rest-timer-label');
  const el=document.getElementById('rest-timer');
  if(!el)return;
  el.classList.add('active');
  updateRestTimerDisplay();
  restTimerInterval=setInterval(()=>{
    restTimerLeft--;
    updateRestTimerDisplay();
    if(restTimerLeft<=0){
      clearInterval(restTimerInterval);
      el.classList.remove('active');
      showToast('Pause vorbei – nächster Satz! 💪','success');
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    }
  },1000);
}

function updateRestTimerDisplay(){
  const bar=document.getElementById('rest-timer-bar');
  const label=document.getElementById('rest-timer-label');
  if(!bar||!label)return;
  const pct=Math.round(restTimerLeft/restTimerTotal*100);
  bar.style.width=pct+'%';
  bar.style.background=pct>50?'var(--accent)':pct>25?'var(--yellow)':'var(--red)';
  const m=Math.floor(restTimerLeft/60),s=restTimerLeft%60;
  label.textContent=`${m}:${s.toString().padStart(2,'0')}`;
}

function skipRestTimer(){
  clearInterval(restTimerInterval);
  document.getElementById('rest-timer')?.classList.remove('active');
}

function getNextRunSuggestion(){
  const runs=DB.get('runs');
  if(!runs.length)return{km:3,minTime:20,maxTime:30,note:'Starte sanft – 20–30 min in Zone 2. Kein Druck!'};
  const last=runs[0];
  const p=getProfile();
  const lastMin=Math.round(timeToSec(last.time)/60)||25;
  const zone=last.pulsLoad?getZone(last.pulsLoad,p.age).zone:2;
  const fit=calcFitnessLevel(last);
  let km=last.km,minT=lastMin,note='';
  if(zone>=4){km=Math.max(2,Math.round(last.km*0.9*10)/10);minT=Math.max(20,lastMin-5);note='Letzter Lauf war intensiv – etwas kürzer und ruhiger, Zone 2 anpeilen.';}
  else if(zone<=1){km=Math.round(last.km*1.1*10)/10;minT=lastMin+10;note='Sehr lockerer Lauf – du kannst Strecke und Zeit etwas steigern.';}
  else if(fit&&fit.delta<25){km=last.km;minT=lastMin;note='Erholungs-Delta noch niedrig – gleiche Einheit. Konsistenz > Intensität!';}
  else{km=Math.round(Math.min(20,last.km*1.07)*10)/10;minT=Math.round(Math.min(90,lastMin*1.07));note='+7% Steigerung. Zone 2 halten, gleichmäßige Atmung.';}
  minT=Math.max(20,Math.min(90,minT));
  return{km,minTime:minT,maxTime:Math.min(90,minT+10),note};
}

//  STREAK / CONSISTENCY
// ════════════════════════════════════════
function getActiveDays(){
  const runs=DB.get('runs');
  const workouts=DB.get('workouts');
  const days=new Set();
  runs.forEach(r=>days.add(r.date));
  workouts.forEach(w=>days.add(w.date));
  return days;
}

function calcStreak(){
  const days=getActiveDays();
  let streak=0,d=new Date();
  d.setHours(0,0,0,0);
  // allow today or yesterday to start streak
  while(true){
    const k=d.toISOString().slice(0,10);
    if(days.has(k)){streak++;d.setDate(d.getDate()-1);}
    else{
      // if today not yet done, check yesterday
      if(streak===0){d.setDate(d.getDate()-1);const k2=d.toISOString().slice(0,10);if(days.has(k2)){streak++;d.setDate(d.getDate()-1);}else break;}
      else break;
    }
  }
  return streak;
}

function weeklyCount(){
  const days=getActiveDays();
  const ws=weekStart();
  let count=0;
  for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);if(days.has(d.toISOString().slice(0,10)))count++;}
  return count;
}

function initRunChart(){
  const runs=DB.get('runs').slice(0,10).reverse();
  if(runs.length<2)return;
  const ctx=document.getElementById('chart-run');
  if(!ctx)return;
  const labels=runs.map(r=>fmtDate(r.date));
  const paces=runs.map(r=>{const s=timeToSec(r.time);return s&&r.km?Math.round(s/r.km):null;});
  const deltas=runs.map(r=>r.pulsLoad&&r.pulsRecovery?r.pulsLoad-r.pulsRecovery:null);
  const effs=runs.map(r=>{
    if(!r.pulsLoad||!r.km||!r.time)return null;
    const s=timeToSec(r.time);return s?Math.round((r.km/s*3600)/r.pulsLoad*1000)/10:null;
  });
  const hasDeltas=deltas.some(d=>d!==null);
  const hasEffs=effs.some(e=>e!==null);
  const datasets=[{
    type:'line',data:paces,borderColor:'#b8ff57',backgroundColor:'rgba(184,255,87,0.05)',
    tension:0.4,pointBackgroundColor:'#b8ff57',pointRadius:3,borderWidth:2,fill:true,yAxisID:'y',label:'Pace'
  }];
  if(hasDeltas) datasets.push({
    type:'line',data:deltas,borderColor:'#4fc3f7',backgroundColor:'transparent',
    tension:0.4,pointBackgroundColor:'#4fc3f7',pointRadius:3,borderWidth:2,yAxisID:'y2',label:'Δ Puls',borderDash:[4,3]
  });
  if(hasEffs) datasets.push({
    type:'line',data:effs,borderColor:'#00e676',backgroundColor:'transparent',
    tension:0.4,pointBackgroundColor:'#00e676',pointRadius:3,borderWidth:2,yAxisID:'y2',label:'Effizienz',borderDash:[2,2]
  });
  const sc={
    x:{ticks:{color:'#4a5a72',font:{size:9}},grid:{color:'#1a2236'}},
    y:{position:'left',ticks:{color:'#b8ff57',font:{size:9},callback:v=>{const m=Math.floor(v/60),s=v%60;return`${m}:${s.toString().padStart(2,'0')}`;},stepSize:30},grid:{color:'#1a2236'},reverse:true}
  };
  if(hasDeltas||hasEffs) sc.y2={position:'right',ticks:{color:'#4fc3f7',font:{size:9}},grid:{display:false}};
  chartInstances.run=new Chart(ctx,{type:'bar',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{display:datasets.length>1,labels:{color:'#7a8a9a',font:{size:9},boxWidth:8,padding:8}},
      tooltip:{callbacks:{label:v=>{
        if(v.dataset.label==='Pace'){const m=Math.floor(v.raw/60),s=v.raw%60;return`Pace: ${m}:${s.toString().padStart(2,'0')} /km`;}
        if(v.dataset.label==='Δ Puls')return`Δ Puls: ${v.raw} bpm`;
        return`Effizienz: ${v.raw}`;
      }},backgroundColor:'#141824',titleColor:'#e2e8f8',bodyColor:'#b8ff57',borderColor:'#222a3a',borderWidth:1}
    },
    scales:sc
  }});
}

let selectedFeeling=-1;
function selectFeeling(i){
  selectedFeeling=i;
  document.querySelectorAll('.feel-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
}

function saveRun(){
  const date=document.getElementById('r-date').value;
  const km=parseFloat(document.getElementById('r-km').value);
  const time=document.getElementById('r-time').value;
  const pulsLoad=document.getElementById('r-puls-load')?.value;
  const pulsRecovery=document.getElementById('r-puls-recovery')?.value;
  if(!date||!km||!time){showToast('Bitte Datum, km und Zeit eingeben!');return;}
  const runs=DB.get('runs');
  runs.unshift({date,km,time,pulsLoad:pulsLoad?+pulsLoad:null,pulsRecovery:pulsRecovery?+pulsRecovery:null,feeling:selectedFeeling});
  runs.sort((a,b)=>b.date.localeCompare(a.date));
  DB.set('runs',runs);
  closeModal();
  showView('run');
}

function deleteRun(i){
  showConfirm('Lauf löschen?',()=>{
    const runs=DB.get('runs');runs.splice(i,1);DB.set('runs',runs);showView('run');
  });
}

function getLastSetsArr(name){
  const workouts=DB.get('workouts');
  for(const w of workouts){
    const ex=w.exercises.find(e=>e.name===name);
    if(ex&&ex.sets.length>0) return ex.sets.filter(s=>s.type!=='warmup');
  }
  return null;
}

function getLastSets(name){
  const workouts=DB.get('workouts');
  for(const w of workouts){
    const ex=w.exercises.find(e=>e.name===name);
    if(ex&&ex.sets.length>0){
      return ex.sets.filter(s=>s.type!=='warmup').map(s=>`${s.weight}kg×${s.reps}`).join(', ');
    }
  }
  return null;
}

function startSession(){
  const tmpl=DB.get('templates');
  if(tmpl.length){
    openModal('startPicker');
  } else {
    activeSession={exercises:[],date:today()};
    openModal('exPicker');
  }
}
function startFromTemplate(i){
  const t=DB.get('templates')[i];
  if(!t)return;
  activeSession={
    exercises:t.exercises.map(ex=>({
      name:ex.name,primary:ex.primary,secondary:ex.secondary,
      sets:ex.sets.map(s=>({weight:s.weight,reps:s.reps,type:s.type||'normal',done:false}))
    })),
    date:today()
  };
  closeModal();
  showView('gym');
}

function cancelSession(){
  showConfirm('Training abbrechen?',()=>{
    activeSession=null;
    showView('gym');
  });
}

function finishSession(){
  if(!activeSession||activeSession.exercises.length===0){showToast('Keine Übungen eingetragen!');return;}
  const workouts=DB.get('workouts');
  workouts.unshift({
    date:activeSession.date,
    exercises:activeSession.exercises.map(ex=>({
      name:ex.name,primary:ex.primary,secondary:ex.secondary,
      sets:ex.sets.map(s=>({weight:s.weight,reps:s.reps,type:s.type,done:s.done}))
    }))
  });
  DB.set('workouts',workouts);
  activeSession=null;
  showView('gym');
}

function addExerciseToSession(name){
  const ex=EXERCISES.find(e=>e.name===name);
  if(!ex)return;
  // Suggest weight from last session
  const last=getLastSets(name);
  let defWeight=60;
  if(last){const m=last.match(/(\d+\.?\d*)kg/);if(m)defWeight=parseFloat(m[1]);}
  activeSession.exercises.push({
    name:ex.name,primary:ex.primary,secondary:ex.secondary,
    sets:[{weight:defWeight,reps:8,type:'normal',done:false}]
  });
  closeModal();
  showView('gym');
}

function deleteSet(ei,si){
  activeSession.exercises[ei].sets.splice(si,1);

}
function moveSet(ei,si,dir){
  const sets=activeSession.exercises[ei].sets;
  const ni=si+dir;
  if(ni<0||ni>=sets.length)return;
  [sets[si],sets[ni]]=[sets[ni],sets[si]];
  showView('gym');
}
function toggleNote(ei,si){

}
function setNote(ei,si,val){

function addSet(ei,type){
  const ex=activeSession.exercises[ei];
  const lastSet=ex.sets.filter(s=>s.type!=='warmup').slice(-1)[0];
  ex.sets.push({weight:lastSet?lastSet.weight:60,reps:lastSet?lastSet.reps:8,type,done:false});
  showView('gym');
}

function removeExercise(ei){
  activeSession.exercises.splice(ei,1);
  showView('gym');
}

function toggleSet(ei,si){
  const s=activeSession.exercises[ei].sets[si];
  s.done=!s.done;
  const ex=activeSession.exercises[ei];
  const num=document.getElementById(`setrow-${ei}-${si}`)?.querySelector('.set-num');
  if(num){num.classList.toggle('done',s.done);num.textContent=s.done?'✓':si+1;}

  if(s.done){
    // Check PR
    if(s.type!=='warmup'&&checkIsPR(ex.name,s.weight,s.reps)){
      const row=document.getElementById(`setrow-${ei}-${si}`);
      if(row){
        const existing=row.querySelector('.pr-badge');
        if(!existing){
          const badge=document.createElement('span');
          badge.className='pr-badge';
          badge.innerHTML='🏆 PR!';
          badge.style.marginLeft='8px';
          row.querySelector('.set-num').after(badge);
        }
      }}
    // Start rest timer
    if(s.type!=='warmup') startRestTimer();
  } else {
    // Undo: remove PR badge
    const row=document.getElementById(`setrow-${ei}-${si}`);
    row?.querySelector('.pr-badge')?.remove();
  }
}

function changeVal(ei,si,field,delta){
  const s=activeSession.exercises[ei].sets[si];
  if(field==='weight'){s.weight=Math.max(0,Math.round((s.weight+delta)*10)/10);}
  else{s.reps=Math.max(1,s.reps+delta);}
  const el=document.getElementById(field==='weight'?`w-${ei}-${si}`:`r-${ei}-${si}`);
  if(el){el.textContent=s[field];el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),250);}
}

function editValManual(ei,si,field){
  const elId=field==='weight'?`w-${ei}-${si}`:`r-${ei}-${si}`;
  const el=document.getElementById(elId);
  if(!el)return;
  const current=activeSession.exercises[ei].sets[si][field];
  const input=document.createElement('input');
  input.type='number';
  input.value=current;
  input.step=field==='weight'?'0.5':'1';
  input.min='0';
  input.style.cssText='width:52px;text-align:center;font-size:15px;font-weight:600;background:var(--bg);color:var(--accent);border:1px solid var(--accent);border-radius:6px;padding:2px 4px;';
  el.replaceWith(input);
  input.focus();
  input.select();
  const save=()=>{
    const val=field==='weight'?Math.max(0,parseFloat(input.value)||0):Math.max(1,parseInt(input.value)||1);
    activeSession.exercises[ei].sets[si][field]=val;
    const newEl=document.createElement('div');
    newEl.className='num-val';
    newEl.id=elId;
    newEl.textContent=val;
    newEl.onclick=()=>editValManual(ei,si,field);
    newEl.style.cursor='pointer';
    input.replaceWith(newEl);
  };
  input.addEventListener('blur',save);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){input.blur();}});
}

function initBodyChart(){
  const bd=DB.get('bodydata').slice(0,30).reverse();
  if(bd.length<2)return;
  const ctx=document.getElementById('chart-body');
  if(!ctx)return;
  const labels=bd.map(e=>fmtDate(e.date));
  const weights=bd.map(e=>e.weight);
  // Trendline (simple linear)
  const n=weights.length;
  const sumX=weights.reduce((_,__,i)=>_+i,0);
  const sumY=weights.reduce((s,v)=>s+v,0);
  const sumXY=weights.reduce((s,v,i)=>s+i*v,0);
  const sumX2=weights.reduce((s,_,i)=>s+i*i,0);
  const slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX);
  const intercept=(sumY-slope*sumX)/n;
  const trend=weights.map((_,i)=>Math.round((intercept+slope*i)*100)/100);
  
  chartInstances.body=new Chart(ctx,{type:'line',data:{labels,datasets:[{data:weights,borderColor:'#4fc3f7',backgroundColor:'rgba(79,195,247,0.08)',tension:0.3,pointBackgroundColor:'#4fc3f7',pointRadius:3,borderWidth:2,fill:true,label:'Gewicht'},{data:trend,borderColor:'rgba(184,255,87,0.5)',backgroundColor:'transparent',tension:0,pointRadius:0,borderWidth:1,borderDash:[4,4],label:'Trend'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>`${v.dataset.label||'Trend'}: ${v.raw} kg`},backgroundColor:'#141824',titleColor:'#e2e8f8',bodyColor:'#4fc3f7',borderColor:'#222a3a',borderWidth:1}},scales:{x:{ticks:{color:'#4a5a72',font:{size:10}},grid:{color:'#1a2236'}},y:{ticks:{color:'#4a5a72',font:{size:10}},grid:{color:'#1a2236'}}}}});
}

function renderCalendar(){
  const wrap=document.getElementById('calendar-wrap');
  if(!wrap)return;

  const runs=DB.get('runs');
  const workouts=DB.get('workouts');
  const runDays=new Set(runs.map(r=>r.date));
  const gymDays=new Set(workouts.map(w=>w.date));

  const now=new Date();
  // Target month based on offset
  const target=new Date(now.getFullYear(),now.getMonth()+calOffset,1);
  const year=target.getFullYear();
  const month=target.getMonth();

  const monthNames=['Januar','Februar','März','April','Mai','Juni',
    'Juli','August','September','Oktober','November','Dezember'];

  // First day of month, adjusted to Mon=0
  const firstDow=(new Date(year,month,1).getDay()+6)%7;
  // Days in month
  const daysInMonth=new Date(year,month+1,0).getDate();
  // Today string
  const todayStr=today();
  // Is this the current month?
  const isCurrentMonth=(calOffset===0);
  const isFutureMonth=(calOffset>0);

  const dayNames=['Mo','Di','Mi','Do','Fr','Sa','So'];

  let html=`
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calOffset--;renderCalendar()">‹</button>
      <div class="cal-month-title">${monthNames[month]} ${year}</div>
      <button class="cal-nav-btn" onclick="calOffset++;renderCalendar()" ${calOffset>=0?'style="opacity:0.3;pointer-events:none;"':''}>›</button>
    </div>
    <div class="cal-grid">
      ${dayNames.map(d=>`<div class="cal-head">${d}</div>`).join('')}`;

  // Leading empty cells
  for(let i=0;i<firstDow;i++) html+=`<div class="cal-cell"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;
    const isFuture=dateStr>todayStr;
    const isRun=runDays.has(dateStr);
    const isGym=gymDays.has(dateStr);
    const isBoth=isRun&&isGym;

    let cls='cal-cell has-day';
    if(isToday) cls+=' today';
    if(isFuture) cls+=' future';
    else if(isBoth) cls+=' both';
    else if(isRun) cls+=' run';
    else if(isGym) cls+=' gym';

    const icon=isBoth?'🏅':isRun?'🏃':isGym?'💪':'';

    html+=`<div class="${cls}">
      <div class="cal-num">${d}</div>
      ${icon?`<div class="cal-icon">${icon}</div>`:'<div style="height:11px;"></div>'}
    </div>`;
  }

  html+=`</div>
  <div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--muted2);">
    <span><span style="color:var(--blue);">■</span> Laufen</span>
    <span><span style="color:var(--accent);">■</span> Gym</span>
    <span>🏅 Beides</span>
    ${isCurrentMonth?`<span style="margin-left:auto;color:var(--accent);font-size:10px;">▣ Heute</span>`:''}

function renderExList(){
  const filtered=EXERCISES.filter(e=>(exFilterCat==='Alle'||e.cat===exFilterCat)&&(!exSearch||e.name.toLowerCase().includes(exSearch.toLowerCase())));
  if(filtered.length===0)return`<div style="text-align:center;padding:20px;color:var(--muted2);">Keine Übungen gefunden</div>`;
  return filtered.map(e=>`
    <div class="ex-item" onclick="addExerciseToSession('${e.name}')">
      <div style="flex:1;">
        <div style="font-weight:600;font-size:14px;">${e.name}</div>
        <div>${e.primary.map(m=>`<span class="muscle-tag primary">${m}</span>`).join('')}${e.secondary.map(m=>`<span class="muscle-tag">${m}</span>`).join('')}</div>
      </div>
      <div style="color:var(--accent);font-size:20px;">+</div>
    </div>`).join('');
}

function setExCat(cat){
  exFilterCat=cat;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.textContent===cat));
  document.getElementById('ex-list').innerHTML=renderExList();
}

function filterExercises(q){
  exSearch=q;
  document.getElementById('ex-list').innerHTML=renderExList();
}

function deleteWorkout(i){
  showConfirm('Training löschen?',()=>{
    const w=DB.get('workouts');w.splice(i,1);DB.set('workouts',w);
    closeModal();showView('gym');
  });
}

function updatePulsePreview(){
  const load=+document.getElementById('r-puls-load')?.value||0;
  const rec=+document.getElementById('r-puls-recovery')?.value||0;
  const el=document.getElementById('pulse-preview');
  if(!el)return;
  const p=getProfile();
  let html='';
  if(load){
    const z=getZone(load,p.age);
    const desc={1:'Sehr locker',2:'Grundlage – ideal!',3:'Aerob – OK',4:'Anaerob – intensiv',5:'Maximum'};
    html+=`<span class="zone-badge ${z.cls}">${z.label}</span> <span style="font-size:12px;color:var(--muted2);">${desc[z.zone]||''}</span>`;
  }
  if(load&&rec&&load>rec){
    const d=load-rec;
    const fit=calcFitnessLevel({pulsLoad:load,pulsRecovery:rec});
    if(fit)html+=`<div style="margin-top:6px;"><span class="zone-badge ${fit.cls}">Δ ${d} bpm – ${fit.label}</span></div>`;
  }
  el.innerHTML=html;
}

function saveSettings(){
  // Save profile
  const p=getProfile();
  p.name=document.getElementById('cfg-name').value||'';
  p.age=+document.getElementById('cfg-age').value||25;
  p.height=+document.getElementById('cfg-height').value||175;
  p.gender=document.getElementById('cfg-gender').value;
  p.activity=+document.getElementById('cfg-activity').value||1.55;
  p.weekGoal=+document.getElementById('cfg-goal').value||3;
  DB.set('profile',p);
  // Save settings
  const activeWg=document.querySelector('.wg-btn.active');
  const s={
    weightGoal:activeWg?activeWg.dataset.val:'maintain',
    kcalOverride:document.getElementById('cfg-kcal').value||'',
    protOverride:document.getElementById('cfg-prot').value||'',
    restTime:document.getElementById('cfg-rest').value||120
  };
  DB.set('settings',s);
  showToast('Einstellungen gespeichert!','success');
  closeModal();
  showView('dashboard');
}

function exportData(){
  const data={
    profile:DB.getObj('profile'),
    settings:DB.getObj('settings'),
    runs:DB.get('runs'),
    workouts:DB.get('workouts'),
    bodydata:DB.get('bodydata'),
    templates:DB.get('templates'),
    exported:new Date().toISOString()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const now=new Date();
  const ts=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}`;
  a.href=url;a.download=`fitcore-backup_${ts}.json`;a.click();
  URL.revokeObjectURL(url);
  showToast('Backup gespeichert!','success');
}
function importData(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.profile)DB.set('profile',data.profile);
      if(data.settings)DB.set('settings',data.settings);
      if(data.runs)DB.set('runs',data.runs);
      if(data.workouts)DB.set('workouts',data.workouts);
      if(data.bodydata)DB.set('bodydata',data.bodydata);
      if(data.templates)DB.set('templates',data.templates);
      showToast('Daten wiederhergestellt!','success');
      closeModal();
      showView('dashboard');
    }catch(err){showToast('Fehler beim Import!','error');}
  };
  reader.readAsText(file);
}

function importDataFromSetup(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.profile)DB.set('profile',data.profile);
      if(data.settings)DB.set('settings',data.settings);
      if(data.runs)DB.set('runs',data.runs);
      if(data.workouts)DB.set('workouts',data.workouts);
      if(data.bodydata)DB.set('bodydata',data.bodydata);
      if(data.templates)DB.set('templates',data.templates);
      document.getElementById('setup-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      window.scrollTo(0,0);
      document.documentElement.style.height='100%';
      document.body.style.height='100%';
      document.body.style.overflow='hidden';
      showToast('Backup geladen – willkommen zurück!','success');
      showView('dashboard');
    }catch(err){showToast('Fehler – ungültige Datei!','error');}
  };
  reader.readAsText(file);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOnBg(e){
  if(e.target===document.getElementById('modal-overlay'))closeModal();
}


// ════════════════════════════════════════
//  CONFIRM DIALOG
// ════════════════════════════════════════
function showConfirm(title, onOk){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-ok-btn').onclick=()=>{closeConfirm();onOk();};
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm(){
  document.getElementById('confirm-overlay').classList.remove('open');
}

// ════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════
let _toastTimer;
function showToast(msg,type='error'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.className='',2800);
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
function init(){
  const p=DB.getObj('profile',null);
  if(p&&p.created){
    document.getElementById('setup-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    showView('dashboard');
  }
}

init();
</script>
